version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cloudcost_postgres
    restart: always
    # We replaced env_file with explicit environment variables to fix the Windows bug
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=supersecretpassword
      - POSTGRES_DB=cloudcost
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: cloudcost_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@cloudcost.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: